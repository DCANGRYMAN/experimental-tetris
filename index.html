<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Builder - Tetris Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4B0082 0%, #8B008B 50%, #6A0DAD 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #2D0052 0%, #4B0082 40%, #6A0DAD 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        .game-board {
            position: relative;
            width: 240px;
            height: 600px;
            background: linear-gradient(135deg, rgba(60, 20, 100, 0.8), rgba(80, 20, 120, 0.8));
            border: 4px solid #FF1493;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            padding: 6px;
            overflow: hidden;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 20, 147, 0.2);
            border-radius: 3px;
            aspect-ratio: 1;
        }

        .castle-block {
            position: absolute;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            border: 1.5px solid #FF1493;
            border-radius: 4px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            user-select: none;
            cursor: pointer;
            touch-action: none;
            transition: all 0.1s ease;
        }

        .castle-block:hover:not(.placed) {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.8);
        }

        .castle-block.placed {
            cursor: default;
            opacity: 0.95;
        }

        .falling {
            animation: fall 0.3s ease-in;
        }

        @keyframes fall {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes lock {
            0% {
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.8), 0 0 16px rgba(255, 20, 147, 0.8);
            }
            100% {
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            }
        }

        .castle-block.lock {
            animation: lock 0.6s ease;
        }

        .stats {
            position: absolute;
            top: 30px;
            left: 40px;
            background: rgba(255, 20, 147, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: left;
            min-width: 180px;
        }

        .stats div {
            margin: 12px 0;
            font-size: 16px;
        }

        .stats span {
            font-size: 20px;
            color: #FF1493;
            display: block;
            margin-top: 5px;
        }

        .next-pieces {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(255, 20, 147, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 140px;
        }

        .next-pieces h3 {
            font-size: 13px;
            margin-bottom: 15px;
            color: #FF1493;
            letter-spacing: 1px;
        }

        .preview-blocks {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preview-item {
            display: grid;
            grid-template-columns: repeat(4, 20px);
            gap: 1.5px;
        }

        .preview-block {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            border: 1px solid #FF1493;
            border-radius: 3px;
            opacity: 0.6;
        }

        .level-indicator {
            position: absolute;
            bottom: 30px;
            right: 40px;
            background: rgba(255, 20, 147, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 160px;
            text-align: center;
        }

        .level-indicator h3 {
            font-size: 13px;
            margin-bottom: 12px;
            color: #FF1493;
            letter-spacing: 1px;
        }

        .level-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 20, 147, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #FF1493, #FF69B4);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .level-number {
            font-size: 28px;
            color: #FF1493;
            margin-top: 10px;
        }

        .level-pulse {
            animation: levelPulse 0.6s ease;
        }

        @keyframes levelPulse {
            0% {
                transform: scale(1);
                color: #FF1493;
            }
            50% {
                transform: scale(1.2);
                color: #FF69B4;
            }
            100% {
                transform: scale(1);
                color: #FF1493;
            }
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 40px;
            background: rgba(255, 20, 147, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            color: white;
            text-align: center;
            font-size: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 220px;
        }

        .controls h3 {
            font-size: 13px;
            margin-bottom: 12px;
            color: #FF1493;
            letter-spacing: 1px;
        }

        .controls p {
            margin: 6px 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .key {
            display: inline-block;
            background: rgba(255, 20, 147, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
            font-weight: bold;
            font-size: 11px;
        }

        .line-clear {
            animation: lineClear 0.6s ease;
        }

        @keyframes lineClear {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
                background: rgba(255, 20, 147, 0.8);
            }
            100% {
                opacity: 0;
            }
        }

        .combo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FF1493;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            pointer-events: none;
            animation: comboFloat 1s ease-out forwards;
            z-index: 500;
        }

        @keyframes comboFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120%) scale(1.5);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <div>SCORE<br><span id="score">0</span></div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 20, 147, 0.3);">LINES<br><span id="lines">0</span></div>
        </div>

        <div class="game-wrapper">
            <div class="header">
                <h1>CASTLE BUILDER</h1>
                <p>TETRIS MEETS CASTLES</p>
            </div>

            <div class="game-board" id="gameBoard">
                <!-- Grid cells will be generated here -->
            </div>
        </div>

        <div class="next-pieces">
            <h3>PRÓXIMAS</h3>
            <div id="nextPieces" class="preview-blocks">
            </div>
        </div>

        <div class="level-indicator">
            <h3>LEVEL</h3>
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
            <div class="level-number" id="levelNumber">1</div>
        </div>

        <div class="controls">
            <h3>CONTROLS</h3>
            <p><span class="key">←</span> <span class="key">→</span> Mover</p>
            <p><span class="key">↓</span> Cair</p>
            <p><span class="key">Space</span> Drop</p>
            <p><span class="key">Click</span> Girar</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
